services:
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    ports:
      - "8000:8000"

  dashboard:
    build:
      context: .
      dockerfile: docker/Dockerfile.dashboard
    environment:
      - INFLATION_API_URL=http://api:8000/predict
    ports:
      - "8501:8501"
    depends_on:
      - api
